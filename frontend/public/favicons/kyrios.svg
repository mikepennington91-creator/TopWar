<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg)" stroke="#f59e0b" stroke-width="3"/>
  <!-- Katana blade -->
  <line x1="30" y1="70" x2="72" y2="28" stroke="url(#blade)" stroke-width="3" stroke-linecap="round"/>
  <!-- Katana guard (tsuba) -->
  <ellipse cx="33" cy="67" rx="6" ry="3" fill="#f59e0b" transform="rotate(-45 33 67)"/>
  <!-- Katana handle -->
  <line x1="28" y1="75" x2="22" y2="81" stroke="#92400e" stroke-width="4" stroke-linecap="round"/>
  <!-- Handle wrapping -->
  <line x1="26" y1="77" x2="24" y2="79" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- K initial -->
  <text x="54" y="62" font-family="sans-serif" font-weight="bold" font-size="28" fill="#f59e0b" text-anchor="middle">K</text>
</svg>
